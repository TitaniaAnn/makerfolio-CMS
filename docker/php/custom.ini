; Match ImageUpload's 10MB cap with headroom; TemplateFileUploader allows 50MB.
upload_max_filesize = 64M
post_max_size       = 72M
memory_limit        = 256M

; Keep error logs out of the document root (admin .htaccess denies *.log but
; other dirs may not have one).
log_errors          = On
error_log           = /var/log/php_errors.log
display_errors      = Off

; Tighter session defaults; bootstrap.php still sets cookie attributes at runtime.
session.use_strict_mode = 1
session.cookie_httponly = 1
session.cookie_samesite = Lax

date.timezone = UTC
